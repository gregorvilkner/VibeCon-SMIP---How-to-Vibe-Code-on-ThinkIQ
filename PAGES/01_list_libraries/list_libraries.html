<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SMIP — Libraries</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    body  { font-family: system-ui, -apple-system, sans-serif; margin: 2rem; color: #126181; }
    h1    { font-size: 2rem; border-bottom: 2px solid #126181; padding-bottom: .4rem; margin-bottom: 1rem; }
    table { border-collapse: collapse; }
    th, td { border: 1px solid #ccd6da; padding: .35rem .8rem; text-align: left; }
    th    { background: #f3f7f9; }
    .muted { color: #888; font-style: italic; }
    .err   { color: #b00020; }
    .meta  { color: #666; font-size: .9rem; margin-bottom: 1rem; }
    code   { background: #f3f7f9; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>SMIP Libraries</h1>
    <p class="meta">
      Sample PAGES/ page. Fetches <code>/api/tool/get_libraries</code> on
      mount and renders the result.
    </p>

    <p v-if="loading" class="muted">Loading…</p>
    <p v-else-if="error" class="err">Error: {{ error }}</p>
    <p v-else-if="!libraries.length" class="muted">No libraries returned.</p>
    <table v-else>
      <thead>
        <tr><th>id</th><th>displayName</th></tr>
      </thead>
      <tbody>
        <tr v-for="lib in libraries" :key="lib.id">
          <td>{{ lib.id }}</td>
          <td>{{ lib.displayName }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          loading: true,
          error: null,
          libraries: [],
        };
      },
      async mounted() {
        try {
          // Same-origin call to the registry-backed dispatch endpoint.
          // Body shape: { args: { ...registry-named kwargs... } }.
          // get_libraries takes no args, so we send an empty object.
          const resp = await fetch('/api/tool/get_libraries', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ args: {} }),
          });
          const json = await resp.json();
          if (!json.ok) throw new Error(json.error || 'unknown error');
          this.libraries = json.data || [];
        } catch (e) {
          this.error = e.message;
        } finally {
          this.loading = false;
        }
      },
    }).mount('#app');
  </script>
</body>
</html>
