<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMIP Automation Chat — Canvas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --brand: #126181;
            --brand-ink: #0e4f68;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;                  /* canvas owns the scroll */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7f9;
        }
        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: .75rem 1.5rem .25rem;
            border-bottom: 2px solid var(--brand);
        }
        header h1 { font-size: 1.6rem; color: var(--brand); margin: 0; }
        header .links a { margin-left: .5rem; }

        #chat-canvas {
            display: block;
            width: 100%;
            height: calc(100vh - 3.4rem);
            cursor: grab;
        }
        #chat-canvas.dragging { cursor: grabbing; }

        /* Input row floats bottom-right over the canvas. */
        #input-row {
            position: fixed;
            bottom: 1.25rem;
            right: 1.5rem;
            z-index: 10;
            width: min(420px, calc(100vw - 3rem));
            display: flex;
            gap: .5rem;
            align-items: flex-end;
            background: #fff;
            padding: .6rem;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        #message-input {
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: .5rem .75rem;
            font-size: .95rem;
            resize: none;
            flex: 1;
            min-width: 0;
            font-family: inherit;
        }
        #message-input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(18,97,129,.2);
        }
        .btn-send, .btn-clear-chat {
            border-radius: 6px;
            cursor: pointer;
            font-size: .9rem;
            padding: .5rem .9rem;
            border: none;
            white-space: nowrap;
        }
        .btn-send { background: var(--brand); color: #fff; }
        .btn-send:hover:not(:disabled) { background: var(--brand-ink); }
        .btn-send:disabled { opacity: .55; cursor: default; }
        .btn-clear-chat {
            background: transparent;
            color: #6c757d;
            border: 1px solid #ced4da;
            padding: .5rem .7rem;
        }
        .btn-clear-chat:hover { background: #e9ecef; }

        /* Jump-to-now pill floats above the input when scrolled back. */
        #jump-to-now {
            position: fixed;
            bottom: 6rem;
            right: 1.5rem;
            z-index: 11;
            display: none;
            background: var(--brand);
            color: #fff;
            border: none;
            padding: .4rem .9rem;
            border-radius: 999px;
            font-size: .82rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
            cursor: pointer;
        }
        #jump-to-now:hover { background: var(--brand-ink); }

        /* HUD readouts (top-left over canvas). */
        .hud {
            position: fixed;
            top: 3.6rem;
            left: 1.5rem;
            z-index: 5;
            background: rgba(255,255,255,.82);
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: .3rem .55rem;
            font-family: ui-monospace, Menlo, Consolas, monospace;
            font-size: .72rem;
            color: #555;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <h1>SMIP Automation Chat <span style="opacity:.55; font-size:1rem; font-weight: 400;">— canvas</span></h1>
    <div class="links">
        <a href="/chat" class="btn btn-sm btn-outline-secondary"><i class="fa fa-comments me-1"></i>Chat</a>
        <a href="/chat_stack" class="btn btn-sm btn-outline-secondary"><i class="fa fa-layer-group me-1"></i>Stack</a>
        <a href="/chat_canvas" class="btn btn-sm btn-outline-secondary"><i class="fa fa-vector-square me-1"></i>Canvas</a>
        <a href="/" class="btn btn-sm btn-outline-secondary"><i class="fa fa-book me-1"></i>Docs</a>
    </div>
</header>

<canvas id="chat-canvas"></canvas>

<div class="hud" id="hud">t = —</div>

<button id="jump-to-now" onclick="Scene.jumpToNow()">
    <i class="fa fa-arrow-right me-1"></i> Jump to now
</button>

<div id="input-row">
    <textarea
        id="message-input"
        rows="2"
        placeholder="Ask about a library, type, or other record…"
    ></textarea>
    <button class="btn-send" id="send-btn" onclick="send()">
        <i class="fa fa-paper-plane"></i>
    </button>
    <button class="btn-clear-chat" onclick="Scene.clear()" title="Clear conversation">
        <i class="fa fa-trash"></i>
    </button>
</div>

<script>
/* ================================================================
   CANVAS CHAT — scene + viewport model
   ================================================================
   Two separate coordinate systems:

     SCENE  : the 2D plane that holds all the content.
              x grows left→right with time;
              y = 0 is the time axis;
              user bubbles live at y < 0 (above the axis),
              assistant/thinking/error at y > 0 (below).
              Scene extent [0..sceneW] × [sceneYMin..sceneYMax]
              grows to fit whatever bubbles contain.

     VIEWPORT : a window into the scene positioned at
              (viewportX, viewportY) with size (viewW, viewH).
              Scrolling, dragging, and wheel events translate
              the viewport in scene space; nothing in the scene
              moves.

   Screen conversion: screenX = sceneX − viewportX, same for Y.

   Rendering: one RAF loop. Layout is deterministic from
   bubbles[] (content → measured size → sequential x placement,
   role-based y), so we just re-layout + re-draw on state change.

   What this variant intentionally does NOT do: rich markdown
   (tables, bold/italic, headings render as plaintext with light
   cleanup), selectable text, copy-to-clipboard, screen-reader
   accessibility. Those are the tradeoffs of canvas-based chat.
   ================================================================ */

const CONFIG = {
    PAD_LEFT:           40,           // left margin in scene coords
    PAD_TOP:            24,           // top margin
    PAD_BOTTOM:         120,          // bottom margin (clears input)
    BUBBLE_MAX_W:       340,          // max bubble inner-content width
    BUBBLE_PAD_X:       12,
    BUBBLE_PAD_Y:       8,
    BUBBLE_GAP_X:       16,           // horizontal gap between bubbles
    BUBBLE_RADIUS:      12,
    LINE_HEIGHT:        19,
    FONT_MSG:           '14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
    FONT_TIME:          '10px ui-monospace, Menlo, Consolas, monospace',
    FONT_AXIS:          '11px ui-monospace, Menlo, Consolas, monospace',
    AXIS_COLOR:         '#d8dde2',
    AXIS_TEXT:          '#8a95a0',
    USER_BG:            '#126181',
    USER_FG:            '#ffffff',
    ASSISTANT_BG:       '#e9ecef',
    ASSISTANT_FG:       '#212529',
    THINKING_BG:        '#e9ecef',
    THINKING_FG:        '#6c757d',
    ERROR_BG:           '#f8d7da',
    ERROR_FG:           '#842029',
    LANE_GAP:           28,           // vertical gap between lanes (for the axis)
    NOW_COLOR:          '#126181',
    EDGE_SNAP_PX:       12,           // "at now" tolerance
    SCROLL_EASE:        0.18,         // 0..1 lerp factor per frame
    AXIS_VIEW_FRAC:     0.28,         // default: axis sits this far from top
                                      // of viewport — leaves most space below
                                      // for long assistant responses.
    AXIS_SCENE_Y:       0,            // the axis's scene Y (convention)
};

/* ============================================================
   Utility: strip the handful of markdown markers that would
   otherwise appear as literal `**foo**` in canvas text.
   ============================================================ */
function stripMarkdown(text) {
    return text
        .replace(/```[\s\S]*?```/g, m => m.replace(/```/g, ''))  // fenced code
        .replace(/\*\*([^*]+)\*\*/g, '$1')
        .replace(/\*([^*\n]+)\*/g, '$1')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/^#+\s*/gm, '')
        .replace(/^[-*]\s+/gm, '• ')
        .replace(/\|/g, ' ');                                   // collapse tables
}

function hms(date) {
    const d = date instanceof Date ? date : new Date(date);
    return String(d.getHours()).padStart(2,'0') + ':' +
           String(d.getMinutes()).padStart(2,'0') + ':' +
           String(d.getSeconds()).padStart(2,'0');
}

/* ============================================================
   Text wrapping in canvas: split on words, measure, break.
   Also honors explicit \n in the source.
   ============================================================ */
function wrapLines(ctx, text, maxWidth) {
    const out = [];
    for (const rawLine of text.split('\n')) {
        if (rawLine === '') { out.push(''); continue; }
        const words = rawLine.split(/\s+/);
        let cur = '';
        for (const word of words) {
            const test = cur ? cur + ' ' + word : word;
            if (ctx.measureText(test).width > maxWidth && cur) {
                out.push(cur);
                cur = word;
            } else {
                cur = test;
            }
        }
        if (cur) out.push(cur);
    }
    return out;
}

/* Rounded rect — ctx.roundRect is modern but I'll hand-roll it
   for wider browser compatibility. */
function roundRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.lineTo(x + w - rr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
    ctx.lineTo(x + w, y + h - rr);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    ctx.lineTo(x + rr, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
    ctx.lineTo(x, y + rr);
    ctx.quadraticCurveTo(x, y, x + rr, y);
    ctx.closePath();
}

/* ============================================================
   Scene: the whole thing.
   ============================================================ */
const Scene = (function () {

    const canvas = document.getElementById('chat-canvas');
    const ctx    = canvas.getContext('2d');
    const hud    = document.getElementById('hud');
    const jumpBtn = document.getElementById('jump-to-now');

    let dpr = window.devicePixelRatio || 1;
    let viewW = 0, viewH = 0;        // viewport size, CSS pixels

    // Scene extent — grows as bubbles are added. sceneYMin is
    // negative when user bubbles sit above the axis.
    let sceneW    = 0;
    let sceneYMin = 0;
    let sceneYMax = 0;

    // State: each bubble holds its own measured geometry in scene coords.
    const bubbles = [];
    let history = [];

    // Viewport — (viewportX, viewportY) is the scene coord shown at
    // screen (0, 0). Larger viewportX = scrolled right = looking at
    // newer content. Larger viewportY = scrolled down = looking at
    // content further below the axis.
    let viewportX = 0,       viewportY = 0;
    let targetViewportX = 0, targetViewportY = 0;    // for smooth scroll

    // Mouse drag state (2D).
    let drag = null;

    // Pulse clock for "now" indicator and thinking dots.
    let t0 = performance.now();

    /* ----- measurement / placement ----- */

    function measureBubble(text, role) {
        ctx.font = CONFIG.FONT_MSG;
        const maxInnerW = CONFIG.BUBBLE_MAX_W;
        const lines = wrapLines(ctx, text, maxInnerW);
        const actualW = Math.min(
            maxInnerW,
            lines.reduce((m, l) => Math.max(m, ctx.measureText(l).width), 20)
        );
        const w = actualW + 2 * CONFIG.BUBBLE_PAD_X;
        const h = lines.length * CONFIG.LINE_HEIGHT
                  + 2 * CONFIG.BUBBLE_PAD_Y
                  + 12;              // footer strip for timestamp
        return { w, h, lines };
    }

    // laneY returns a SCENE y-coord, not a viewport one. Bubble
    // placement is independent of the viewport; the viewport just
    // decides what portion of the scene is visible.
    function laneY(role, h) {
        if (role === 'user') {
            return CONFIG.AXIS_SCENE_Y - CONFIG.LANE_GAP - h;
        }
        // assistant / thinking / error live below the axis
        return CONFIG.AXIS_SCENE_Y + CONFIG.LANE_GAP;
    }

    function layout() {
        let x = CONFIG.PAD_LEFT;
        let yMin = CONFIG.AXIS_SCENE_Y, yMax = CONFIG.AXIS_SCENE_Y;
        for (const b of bubbles) {
            b.x = x;
            b.y = laneY(b.role, b.h);
            if (b.y < yMin)              yMin = b.y;
            if (b.y + b.h > yMax)        yMax = b.y + b.h;
            x += b.w + CONFIG.BUBBLE_GAP_X;
        }
        // sceneW = right edge of the last bubble + a comfortable gap so
        // "now" sits just left of the input.
        const lastX = bubbles.length
            ? bubbles[bubbles.length - 1].x + bubbles[bubbles.length - 1].w
            : CONFIG.PAD_LEFT;
        sceneW    = lastX + 220;
        sceneYMin = yMin - CONFIG.PAD_TOP;
        sceneYMax = yMax + CONFIG.PAD_BOTTOM;
    }

    /* ----- viewport bounds ----- */

    function maxViewportX() { return Math.max(0, sceneW - viewW); }
    function maxViewportY() {
        // If the scene Y extent is smaller than the viewport, we
        // can't pan down past the preferred position; clamp to
        // preferred so the axis stays put.
        return Math.max(preferredViewportY(), sceneYMax - viewH);
    }
    function minViewportY() {
        return Math.min(preferredViewportY(), sceneYMin);
    }
    function preferredViewportY() {
        // Put the axis at AXIS_VIEW_FRAC from the top of the viewport.
        // axis screen Y = AXIS_SCENE_Y - viewportY, so solve for viewportY.
        return CONFIG.AXIS_SCENE_Y - viewH * CONFIG.AXIS_VIEW_FRAC;
    }
    function clampX(x) { return Math.max(0, Math.min(maxViewportX(), x)); }
    function clampY(y) { return Math.max(minViewportY(), Math.min(maxViewportY(), y)); }

    function atNow() {
        return Math.abs(targetViewportX - maxViewportX()) < CONFIG.EDGE_SNAP_PX;
    }

    function scrollToNow(animated = true) {
        targetViewportX = maxViewportX();
        // Reset Y to the preferred framing whenever we jump to now;
        // if the user is manually panning Y and wants to stay, they
        // can — but "jump to now" means "reset the view".
        targetViewportY = clampY(preferredViewportY());
        if (!animated) {
            viewportX = targetViewportX;
            viewportY = targetViewportY;
        }
        jumpBtn.style.display = 'none';
    }

    function jumpToNow() { scrollToNow(true); }

    /* ----- public: add/remove/modify bubbles ----- */

    function add(role, text, opts = {}) {
        const cleaned = role === 'assistant' ? stripMarkdown(text) : text;
        const wasAtNow = atNow() || bubbles.length === 0;
        const m = measureBubble(cleaned, role);
        const b = {
            id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()),
            role,
            text: cleaned,
            timestamp: new Date(),
            born: performance.now(),       // for fade-in
            ...m,
            x: 0, y: 0,
        };
        bubbles.push(b);
        layout();

        if (wasAtNow) {
            scrollToNow(true);
        } else {
            jumpBtn.style.display = 'block';
        }
        return b;
    }

    function updateBubble(b, role, text) {
        const cleaned = role === 'assistant' ? stripMarkdown(text) : text;
        const wasAtNow = atNow();
        const m = measureBubble(cleaned, role);
        b.role = role;
        b.text = cleaned;
        Object.assign(b, m);
        layout();
        if (wasAtNow) scrollToNow(true);
    }

    function remove(b) {
        const i = bubbles.indexOf(b);
        if (i >= 0) bubbles.splice(i, 1);
        layout();
    }

    function clear() {
        bubbles.length = 0;
        history = [];
        layout();
        viewportX = targetViewportX = 0;
        viewportY = targetViewportY = clampY(preferredViewportY());
        jumpBtn.style.display = 'none';
    }

    /* ----- history accessor for API plumbing ----- */

    function getHistory() { return history; }
    function setHistory(h) { history = h; }

    /* ----- rendering ----- */

    function axisScreenY() {
        // Convert scene axis y → screen y. Round + .5 for a crisp 1px line.
        return Math.round(CONFIG.AXIS_SCENE_Y - viewportY) + 0.5;
    }

    function drawAxis(now) {
        const cy = axisScreenY();
        // Only draw the axis if it's actually in the viewport.
        if (cy < -20 || cy > viewH + 20) return;

        ctx.strokeStyle = CONFIG.AXIS_COLOR;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, cy);
        ctx.lineTo(viewW, cy);
        ctx.stroke();

        ctx.fillStyle = CONFIG.AXIS_TEXT;
        ctx.font = CONFIG.FONT_AXIS;
        ctx.textBaseline = 'middle';

        // Tick at each bubble's x — shows when that bubble arrived.
        for (const b of bubbles) {
            const screenX = b.x + b.w / 2 - viewportX;
            if (screenX < -40 || screenX > viewW + 40) continue;
            ctx.strokeStyle = CONFIG.AXIS_COLOR;
            ctx.beginPath();
            ctx.moveTo(screenX + 0.5, cy - 4);
            ctx.lineTo(screenX + 0.5, cy + 4);
            ctx.stroke();
            ctx.textAlign = 'center';
            ctx.fillText(hms(b.timestamp), screenX, cy + 14);
        }
    }

    function drawBubble(b, now) {
        // Scene → screen conversion. Bubble (b.x, b.y) is in scene
        // coords; we subtract the viewport's scene origin to paint.
        const sx = Math.round(b.x - viewportX);
        const sy = Math.round(b.y - viewportY);

        // Cull if entirely outside the viewport (both axes).
        if (sx + b.w < -40 || sx > viewW + 40) return;
        if (sy + b.h < -40 || sy > viewH + 40) return;

        const age = now - b.born;
        const fade = Math.min(1, age / 250);

        let bg, fg, style = 'normal';
        if      (b.role === 'user')      { bg = CONFIG.USER_BG;      fg = CONFIG.USER_FG; }
        else if (b.role === 'assistant') { bg = CONFIG.ASSISTANT_BG; fg = CONFIG.ASSISTANT_FG; }
        else if (b.role === 'thinking')  { bg = CONFIG.THINKING_BG;  fg = CONFIG.THINKING_FG; style = 'italic'; }
        else if (b.role === 'error')     { bg = CONFIG.ERROR_BG;     fg = CONFIG.ERROR_FG; }

        ctx.globalAlpha = fade;
        ctx.fillStyle = bg;
        roundRect(ctx, sx, sy, b.w, b.h, CONFIG.BUBBLE_RADIUS);
        ctx.fill();

        // Tail — small pointer toward the axis in screen space.
        const cy = axisScreenY();
        ctx.beginPath();
        const tailX   = b.role === 'user' ? sx + b.w - 18 : sx + 18;
        const tailTop = b.role === 'user' ? sy + b.h      : sy;
        const tailTip = b.role === 'user' ? cy - 4        : cy + 4;
        ctx.moveTo(tailX, tailTop);
        ctx.lineTo(tailX + 10, tailTop);
        ctx.lineTo(tailX + 5, tailTip);
        ctx.closePath();
        ctx.fill();

        // Text.
        ctx.font = (style === 'italic' ? 'italic ' : '') + CONFIG.FONT_MSG;
        ctx.fillStyle = fg;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        let ty = sy + CONFIG.BUBBLE_PAD_Y;
        const tx = sx + CONFIG.BUBBLE_PAD_X;

        // Thinking bubble gets animated dots.
        if (b.role === 'thinking') {
            const n = Math.floor((now - t0) / 400) % 4;
            const dots = '.'.repeat(n);
            ctx.fillText('Thinking' + dots, tx, ty);
        } else {
            for (const line of b.lines) {
                ctx.fillText(line, tx, ty);
                ty += CONFIG.LINE_HEIGHT;
            }
        }

        // Timestamp in bubble's bottom-right corner.
        ctx.font = CONFIG.FONT_TIME;
        ctx.fillStyle = b.role === 'user'
            ? 'rgba(255,255,255,.6)'
            : 'rgba(0,0,0,.45)';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillText(hms(b.timestamp), sx + b.w - CONFIG.BUBBLE_PAD_X, sy + b.h - 6);

        ctx.globalAlpha = 1;
    }

    function drawNowIndicator(now) {
        if (bubbles.length === 0) return;
        const last = bubbles[bubbles.length - 1];
        const nowSceneX = last.x + last.w + CONFIG.BUBBLE_GAP_X;
        const sx = nowSceneX - viewportX;
        if (sx < -20 || sx > viewW + 20) return;

        const pulse = 0.5 + 0.5 * Math.sin((now - t0) / 500);
        ctx.strokeStyle = CONFIG.NOW_COLOR;
        ctx.globalAlpha = 0.35 + 0.35 * pulse;
        ctx.lineWidth = 1;
        ctx.beginPath();
        // Vertical line in viewport space: NOW is a marker on the
        // viewport, not anchored to the scene vertically.
        ctx.moveTo(sx + 0.5, CONFIG.PAD_TOP);
        ctx.lineTo(sx + 0.5, viewH - CONFIG.PAD_BOTTOM);
        ctx.stroke();

        // Dot sits on the axis — which IS scene-anchored, so it'll
        // slide up and down as the user pans Y.
        ctx.fillStyle = CONFIG.NOW_COLOR;
        ctx.globalAlpha = 0.5 + 0.5 * pulse;
        ctx.beginPath();
        ctx.arc(sx, axisScreenY(), 4 + 1.5 * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.font = CONFIG.FONT_AXIS;
        ctx.fillStyle = CONFIG.NOW_COLOR;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('NOW', sx + 8, CONFIG.PAD_TOP + 2);
    }

    function drawEmptyState() {
        if (bubbles.length > 0) return;
        ctx.fillStyle = '#adb5bd';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '14px -apple-system, sans-serif';
        ctx.fillText('Ask anything about libraries, types, or other records in the SMIP instance.',
                     viewW / 2, viewH / 2);
    }

    function render(now) {
        // Ease viewport toward its targets for smooth scroll — both axes.
        const dx = targetViewportX - viewportX;
        if (Math.abs(dx) > 0.5) viewportX += dx * CONFIG.SCROLL_EASE;
        else                    viewportX  = targetViewportX;

        const dy = targetViewportY - viewportY;
        if (Math.abs(dy) > 0.5) viewportY += dy * CONFIG.SCROLL_EASE;
        else                    viewportY  = targetViewportY;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, viewW, viewH);

        drawAxis(now);
        drawEmptyState();
        for (const b of bubbles) drawBubble(b, now);
        drawNowIndicator(now);

        // HUD readout: viewport origin in scene coords + timestamp + count.
        const last = bubbles[bubbles.length - 1];
        const xs = Math.round(viewportX).toString().padStart(5);
        const ys = Math.round(viewportY).toString().padStart(5);
        hud.textContent = `x=${xs} y=${ys}  n=${bubbles.length}  ${last ? hms(last.timestamp) : '—'}`;

        // Jump-to-now badge visibility.
        if (!atNow() && bubbles.length > 0) {
            jumpBtn.style.display = 'block';
        } else {
            jumpBtn.style.display = 'none';
        }
    }

    /* ----- resize / DPR handling ----- */

    function resize() {
        dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        viewW = rect.width;
        viewH = rect.height;
        canvas.width  = Math.round(viewW * dpr);
        canvas.height = Math.round(viewH * dpr);
        // Lane Y is scene-absolute now, so re-layout is only needed
        // if bubble geometry changed — but it's cheap and keeps scene
        // bounds honest after a resize.
        layout();
        scrollToNow(false);
    }

    /* ----- interactions — 2D pan ----- */

    canvas.addEventListener('pointerdown', e => {
        drag = {
            x:  e.clientX,  y:  e.clientY,
            vx: viewportX,  vy: viewportY,
        };
        canvas.classList.add('dragging');
        canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', e => {
        if (!drag) return;
        const dx = e.clientX - drag.x;
        const dy = e.clientY - drag.y;
        // Drag is 1:1 (no easing); clamp to scene bounds on both axes.
        targetViewportX = clampX(drag.vx - dx);
        targetViewportY = clampY(drag.vy - dy);
        viewportX = targetViewportX;
        viewportY = targetViewportY;
    });
    canvas.addEventListener('pointerup', () => {
        drag = null;
        canvas.classList.remove('dragging');
    });
    canvas.addEventListener('pointercancel', () => {
        drag = null;
        canvas.classList.remove('dragging');
    });

    canvas.addEventListener('wheel', e => {
        // Natural mapping: deltaX pans X, deltaY pans Y.
        // On a plain mouse wheel (deltaX === 0) this scrolls vertically,
        // which is the intuitive "read more of this long response" behavior.
        // Hold shift to coerce the vertical wheel into horizontal scroll
        // through history.
        if (e.shiftKey && Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
            targetViewportX = clampX(targetViewportX + e.deltaY);
        } else {
            targetViewportX = clampX(targetViewportX + e.deltaX);
            targetViewportY = clampY(targetViewportY + e.deltaY);
        }
        e.preventDefault();
    }, { passive: false });

    window.addEventListener('resize', resize);

    // RAF loop.
    function loop() {
        render(performance.now());
        requestAnimationFrame(loop);
    }

    // Kick off.
    resize();
    requestAnimationFrame(loop);

    return { add, updateBubble, remove, clear, jumpToNow, getHistory, setHistory };
})();

/* ============================================================
   Chat plumbing — same shape as /chat and /chat_stack.
   ============================================================ */
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');

messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

async function send() {
    const text = messageInput.value.trim();
    if (!text) return;
    messageInput.value = '';
    sendBtn.disabled = true;

    Scene.add('user', text);
    const thinking = Scene.add('thinking', 'Thinking');

    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history: Scene.getHistory() }),
        });
        const json = await resp.json();

        if (json.ok) {
            Scene.updateBubble(thinking, 'assistant', json.data.response);
            Scene.setHistory(json.data.history);
        } else {
            Scene.updateBubble(thinking, 'error', 'Error: ' + (json.error || 'Unknown error'));
        }
    } catch (err) {
        Scene.updateBubble(thinking, 'error', 'Network error: ' + err.message);
    } finally {
        sendBtn.disabled = false;
        messageInput.focus();
    }
}
</script>
