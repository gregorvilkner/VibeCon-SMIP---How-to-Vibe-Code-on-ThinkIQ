<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMIP Automation Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --brand: #126181; }
        body {
            padding: 1.5rem 2rem;
            font-family: sans-serif;
            background: #f5f7f9;
        }
        .page-title { font-size: 2.2rem; color: var(--brand); padding: .5rem 0; }
        hr.brand { border-color: var(--brand); border-width: 2px; }

        /* Plain single-column chat: messages stack top-to-bottom inside a
           scrolling pane; input row sits beneath. Out-of-the-box layout. */
        #chat-window {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            height: calc(100vh - 14rem);
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .msg {
            padding: .6rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
            font-size: .9rem;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: .75rem;
            max-width: 85%;
        }
        .msg.user {
            background: var(--brand);
            color: #fff;
            border-bottom-right-radius: 3px;
            align-self: flex-end;
        }
        .msg.assistant {
            background: #e9ecef;
            color: #212529;
            border-bottom-left-radius: 3px;
            align-self: flex-start;
        }
        .msg.assistant p { margin: 0 0 .4rem; }
        .msg.assistant p:last-child { margin-bottom: 0; }
        .msg.assistant table {
            border-collapse: collapse;
            font-family: ui-monospace, Menlo, Consolas, 'Courier New', monospace;
            font-size: .82rem;
            margin: .25rem 0;
        }
        .msg.assistant th, .msg.assistant td {
            border: 1px solid #adb5bd;
            padding: .2rem .55rem;
            text-align: right;
        }
        .msg.assistant th:first-child, .msg.assistant td:first-child { text-align: left; }
        .msg.assistant th { background: #d0d9de; }
        .msg.assistant code {
            font-family: ui-monospace, Menlo, Consolas, 'Courier New', monospace;
            font-size: .82rem;
            background: #d0d9de;
            padding: .1rem .3rem;
            border-radius: 3px;
        }
        .msg.thinking {
            background: #e9ecef;
            color: #6c757d;
            font-style: italic;
            border-bottom-left-radius: 3px;
            align-self: flex-start;
        }
        .msg.error {
            background: #f8d7da;
            color: #842029;
            border-bottom-left-radius: 3px;
            align-self: flex-start;
        }

        .empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #adb5bd;
            pointer-events: none;
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: .5rem; }
        .empty-state p { font-size: .95rem; }

        #input-row {
            margin-top: 1rem;
            display: flex;
            gap: .5rem;
            align-items: flex-end;
            background: #fff;
            padding: .6rem;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        }
        #message-input {
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: .5rem .75rem;
            font-size: .95rem;
            resize: none;
            flex: 1;
            min-width: 0;
        }
        #message-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 2px rgba(18,97,129,.2); }

        .btn-send {
            background: var(--brand);
            color: #fff;
            border: none;
            padding: .5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: .95rem;
            white-space: nowrap;
        }
        .btn-send:hover:not(:disabled) { background: #0e4f68; }
        .btn-send:disabled { opacity: .55; cursor: default; }

        .btn-clear-chat {
            background: transparent;
            color: #6c757d;
            border: 1px solid #ced4da;
            padding: .5rem .8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: .9rem;
        }
        .btn-clear-chat:hover { background: #e9ecef; }

        /* Shared top-nav links — present on all 4 pages so users can hop
           between Columns / Stack / Canvas / Docs from anywhere. */
        .nav-links a { margin-left: .4rem; }
    </style>
</head>
<body>
<div class="row mb-2">
    <div class="col-12 d-flex align-items-baseline justify-content-between">
        <h1 class="page-title">SMIP Automation Chat</h1>
        <div class="nav-links">
            <a href="/chat" class="btn btn-sm btn-outline-secondary"><i class="fa fa-comments me-1"></i>Chat</a>
            <a href="/chat_stack" class="btn btn-sm btn-outline-secondary"><i class="fa fa-layer-group me-1"></i>Stack</a>
            <a href="/chat_canvas" class="btn btn-sm btn-outline-secondary"><i class="fa fa-vector-square me-1"></i>Canvas</a>
            <a href="/" class="btn btn-sm btn-outline-secondary"><i class="fa fa-book me-1"></i>Docs</a>
        </div>
    </div>
    <hr class="brand" />
</div>

<div id="chat-window">
    <div class="empty-state" id="empty-state">
        <i class="fa fa-flask"></i>
        <p>Ask anything about libraries, types, or other records in the SMIP instance.</p>
    </div>
</div>

<div id="input-row">
    <textarea
        id="message-input"
        rows="2"
        placeholder="Ask about a library, type, or other record…"
    ></textarea>
    <button class="btn-send" id="send-btn" onclick="sendMessage()">
        <i class="fa fa-paper-plane me-1"></i> Send
    </button>
    <button class="btn-clear-chat" onclick="clearChat()" title="Clear conversation">
        <i class="fa fa-trash"></i>
    </button>
</div>

<script>
    let history = [];

    const chatWindow   = document.getElementById('chat-window');
    const emptyState   = document.getElementById('empty-state');
    const messageInput = document.getElementById('message-input');
    const sendBtn      = document.getElementById('send-btn');

    // Send on Enter (Shift+Enter for newline).
    messageInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    function appendMsg(role, text) {
        emptyState.style.display = 'none';
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if (role === 'assistant') {
            div.innerHTML = marked.parse(text);
        } else {
            div.textContent = text;
        }
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        messageInput.value = '';
        sendBtn.disabled = true;

        appendMsg('user', text);
        const thinking = appendMsg('thinking', 'Thinking…');

        try {
            const resp = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history }),
            });
            const json = await resp.json();

            thinking.remove();

            if (json.ok) {
                appendMsg('assistant', json.data.response);
                history = json.data.history;
            } else {
                appendMsg('error', 'Error: ' + (json.error || 'Unknown error'));
            }
        } catch (err) {
            thinking.remove();
            appendMsg('error', 'Network error: ' + err.message);
        } finally {
            sendBtn.disabled = false;
            messageInput.focus();
        }
    }

    function clearChat() {
        history = [];
        // Drop all messages but keep the empty-state node.
        Array.from(chatWindow.querySelectorAll('.msg')).forEach(n => n.remove());
        emptyState.style.display = '';
    }
</script>
</body>
</html>
